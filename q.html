<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Form Link</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: #222;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 1.7rem;  /* Increased header size by ~15% */
      font-weight: bold;
    }

    /* Scrolling Banner */
    .scrolling-banner {
      background-color: #3498db;
      color: #fff;
      padding: 12px 0;        /* Increased height ~15% */
      overflow: hidden;
      white-space: nowrap;
      font-size: 1.25rem;     /* Increased font size ~15% */
      font-weight: bold;
    }

    .scrolling-banner a {
      color: #fff;
      text-decoration: none;
      display: inline-block;
      padding-left: 100%;
      animation: scroll-left 15s linear infinite;
    }

    @keyframes scroll-left {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    main {
      padding: 25px;
      text-align: center;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    📚 Research Project Website
  </header>

<!-- Scrolling Google Form Link -->
<div class="scrolling-banner">
  <a href="https://forms.gle/your-google-form-link" target="_blank">
    📑 Researchers: Please record your activity. Click here to submit the form at the start or completion of your research.
  </a>
</div>



  <!-- Main Content -->
  <main>
    <h2>Welcome to the Research Portal</h2>
    <p>Here you can track your research activities and submit forms easily.</p>
  </main>
</body>
</html>
